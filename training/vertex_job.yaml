# Vertex AI Custom Training Job Specification
# This defines how to run the GNN-MAPPO training on Google Cloud's managed GPU infrastructure.

workerPoolSpecs:
  machineSpec:
    machineType: n1-standard-8
    acceleratorType: NVIDIA_TESLA_T4
    acceleratorCount: 1
  replicaCount: 1
  containerSpec:
    # Use a pre-built PyTorch container or a custom one with PyG installed
    imageUri: gcr.io/deeplearning-platform-release/pytorch-gpu.2-2.py310
    command:
      - python
      - training/train_mappo.py
    args:
      - "--total-timesteps=5000000"
      - "--topology=india_50_nodes"
    env:
      - name: GEMINI_API_KEY
        value: "YOUR_API_KEY_HERE" # Recommended to use Secret Manager in production
      - name: NEO4J_URI
        value: "bolt://your-neo4j-instance:7687"
      - name: NEO4J_PASSWORD
        value: "your-password"
